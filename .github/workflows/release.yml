name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Karaoke Lyrics Maker v__VERSION__'
          releaseBody: |
            ## Downloads
            - **macOS (Apple Silicon)**: Karaoke-Lyrics-Maker_aarch64.dmg
            - **macOS (Intel)**: Karaoke-Lyrics-Maker_x64.dmg
            - **Windows**: Karaoke-Lyrics-Maker_x64-setup.exe / .msi
            - **Linux (Debian/Ubuntu)**: karaoke-lyrics-maker_amd64.deb
            - **Linux (AppImage)**: karaoke-lyrics-maker_amd64.AppImage

            ## macOS Security Notice
            On macOS, you may see "cannot be opened" when first launching. Go to **System Settings → Privacy & Security** and click **"Open Anyway"**.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
