name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          mkdir -p release-artifacts
          echo "=== Searching for artifacts ==="
          ls -R src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle dir"
          # Copy all bundle artifacts (exclude .sig files)
          for f in src-tauri/target/release/bundle/**/*.dmg \
                   src-tauri/target/release/bundle/**/*.app.tar.gz \
                   src-tauri/target/release/bundle/**/*.AppImage \
                   src-tauri/target/release/bundle/**/*.deb \
                   src-tauri/target/release/bundle/**/*.msi \
                   src-tauri/target/release/bundle/**/*.exe \
                   src-tauri/target/release/bundle/**/*.nsis.zip; do
            if [ -f "$f" ] && [[ "$f" != *.sig ]]; then
              echo "Copying: $f"
              cp "$f" release-artifacts/
            fi
          done
          echo "=== Artifacts collected ==="
          ls -lh release-artifacts/ || echo "No artifacts found"

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
